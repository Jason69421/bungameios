name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cordova platform add ios

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -workspace platforms/ios/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP_PATH=$(find build -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found."
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          rm -rf Payload
          mkdir -p Payload

          cp -R "$APP_PATH" "Payload/$(basename "$APP_PATH")"

          cd Payload
          zip -r ../App.ipa "$(basename "$APP_PATH")"

          cd ..

          echo "IPA created:"
          ls -lh App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
          if-no-files-found: error
