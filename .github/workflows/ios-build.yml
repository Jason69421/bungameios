      - name: Package IPA
        run: |
          APP_PATH=$(find "build/Build/Products/Debug-iphoneos" -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi

          echo "Found app: $APP_PATH"

          rm -rf Payload App.ipa
          mkdir Payload

          cp -R "$APP_PATH" Payload/

          echo "Contents of Payload:"
          ls -la Payload

          echo "Creating IPA..."
          zip -r App.ipa Payload

          echo "IPA created successfully:"
          ls -lh App.ipa
