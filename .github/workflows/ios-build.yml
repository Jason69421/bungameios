name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cordova platform add ios

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -workspace platforms/ios/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Find and package IPA
        run: |
          echo "Searching for App.app..."

          APP_PATH=$(find build platforms/ios -type d -name "App.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: App.app was not found."
            echo "Searching for all .app files:"
            find . -type d -name "*.app"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          rm -rf Payload
          mkdir -p Payload

          cp -R "$APP_PATH" Payload/App.app

          zip -r App.ipa Payload

          echo "IPA created successfully:"
          ls -lh App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
          if-no-files-found: error
